<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enterprise AI Copilot — Intelligent Document Q&A powered by RAG">
    <title>Login — Enterprise AI Copilot</title>
    <link rel="stylesheet" href="/css/base.css?v=2">
    <link rel="stylesheet" href="/css/auth.css?v=2">
    <link rel="stylesheet" href="/css/components.css?v=2">
</head>
<body>
    <div class="auth-page animate-fade-in">
        
        <!-- Animated Background Effects -->
        <div class="auth-bg-fx"></div>

        <!-- LEFT PANEL: Glowing Hero -->
        <div class="auth-hero">
            <div class="light-rays">
                <div class="ray"></div>
                <div class="ray"></div>
                <div class="ray"></div>
            </div>

            <div class="floating-icons">
                <div class="floating-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></div>
                <div class="floating-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                <div class="floating-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></div>
                <div class="floating-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
                <div class="floating-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
                <div class="floating-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
            </div>

            <div class="hero-artwork-container">
                <img src="/assets/hero-artwork.png" alt="Futuristic AI Artwork" class="hero-artwork">
            </div>
        </div>

        <!-- RIGHT PANEL: Auth Form -->
        <div class="auth-panel">
            <div class="auth-card animate-scale-in">
                <div class="auth-header">
                    <div class="auth-logo">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="12" fill="#0ea5e9"/>
                            <path d="M12 28V16l8-6 8 6v12l-8-4-8 4z" fill="white" opacity="0.95"/>
                            <circle cx="20" cy="18" r="3" fill="#0ea5e9"/>
                        </svg>
                    </div>
                    <h1>Enterprise AI Copilot</h1>
                    <p>Your secure, intelligent workspace</p>
                </div>

                <div class="auth-tabs">
                    <a href="/" class="auth-tab active">Sign In</a>
                    <a href="/signup" class="auth-tab">Create Account</a>
                </div>

                <form class="auth-form" id="loginForm">
                    <div class="form-group" id="emailGroup">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="email" id="email" name="email" placeholder="Email Address" required autocomplete="email">
                        <div class="form-error" id="emailError"></div>
                    </div>

                    <div class="form-group" id="passwordGroup">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
                        <div class="form-error" id="passwordError"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-group">
                            <input type="checkbox" name="remember" id="remember">
                            Remember me
                        </label>
                        <!-- To match constraints, no new text, just re-styling the link -->
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="auth-btn" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <div class="btn-spinner"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/api.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
